<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/baremux/index.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#8b5cf6;--vl:#a78bfa;--vd:#6d28d9;--vg:rgba(139,92,246,0.12);
  --chrome:#111118;--chrome2:#16161f;--tabbar:#0c0c14;
  --border:rgba(139,92,246,0.18);--border2:rgba(255,255,255,0.06);
  --text:#e2e8f0;--muted:#64748b;--urlbg:#0d0d18;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--chrome);font-family:'Inter',sans-serif;color:var(--text)}

/* BROWSER SHELL */
#browser{display:flex;flex-direction:column;height:100vh;width:100vw}

/* TAB BAR */
#tab-bar{
  height:36px;background:var(--tabbar);
  display:flex;align-items:flex-end;padding:0 0 0 6px;gap:1px;
  flex-shrink:0;border-bottom:1px solid var(--border);
  overflow-x:auto;overflow-y:hidden;
}
#tab-bar::-webkit-scrollbar{height:0}

.tab{
  height:28px;min-width:60px;max-width:200px;flex:0 0 auto;
  display:flex;align-items:center;padding:0 8px 0 10px;gap:6px;
  background:transparent;border:1px solid transparent;
  border-bottom:none;border-radius:7px 7px 0 0;
  cursor:pointer;overflow:hidden;font-size:11.5px;color:var(--muted);
  transition:background .12s,color .12s;user-select:none;flex-shrink:0;
  white-space:nowrap;
}
.tab.active{background:var(--chrome);color:var(--text);border-color:var(--border);z-index:2;position:relative}
.tab:not(.active):hover{background:rgba(139,92,246,0.07);color:rgba(255,255,255,0.6)}
.tab-fav{width:13px;height:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.tab-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11.5px;font-weight:400}
.tab-x{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;opacity:0;transition:opacity .12s,background .12s;color:var(--muted);line-height:1}
.tab:hover .tab-x,.tab.active .tab-x{opacity:1}
.tab-x:hover{background:rgba(255,255,255,0.1);color:white}

#newtab-btn{
  height:28px;width:28px;margin-left:2px;margin-bottom:0;align-self:flex-end;
  background:transparent;border:none;color:var(--muted);font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  border-radius:6px 6px 0 0;transition:color .15s,background .15s;flex-shrink:0;
}
#newtab-btn:hover{color:var(--vl);background:rgba(139,92,246,0.08)}

/* TOOLBAR */
#toolbar{
  height:44px;background:var(--chrome);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 8px;gap:4px;flex-shrink:0;
}
.nb{
  width:30px;height:30px;background:transparent;border:none;border-radius:7px;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:color .15s,background .15s;flex-shrink:0;
}
.nb:hover:not(:disabled){color:var(--vl);background:var(--vg)}
.nb:disabled{opacity:0.2;cursor:default}
.nb svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* URL BAR */
#url-wrap{flex:1;position:relative}
#url-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;display:flex;align-items:center}
#url-icon svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
#url-input{
  width:100%;height:32px;background:var(--urlbg);border:1.5px solid var(--border2);
  border-radius:16px;padding:0 14px 0 32px;color:var(--text);
  font-family:'Inter',sans-serif;font-size:12.5px;outline:none;
  transition:border-color .2s,background .2s;
}
#url-input:focus{border-color:var(--v);background:#090914}
#url-input::placeholder{color:var(--muted)}

/* ENGINE CORNER */
#engine-corner{position:relative;flex-shrink:0}
#engine-btn{
  width:32px;height:32px;background:var(--vg);border:1.5px solid var(--border);
  border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,background .2s;position:relative;
}
#engine-btn:hover{border-color:var(--v);background:rgba(139,92,246,0.22)}
#engine-btn img{width:16px;height:16px;border-radius:3px}

#engine-drop{
  position:absolute;top:calc(100% + 5px);right:0;width:172px;
  background:#111118;border:1px solid var(--border);border-radius:11px;
  padding:5px;display:none;z-index:99999;
  box-shadow:0 20px 50px rgba(0,0,0,0.7);
  animation:dd .16s cubic-bezier(.2,.8,.2,1);
}
@keyframes dd{from{opacity:0;transform:translateY(-5px) scale(.97)}to{opacity:1;transform:none}}
#engine-drop.open{display:block}
.eopt{
  display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;
  cursor:pointer;font-size:12.5px;color:var(--text);transition:background .12s;font-weight:400;
}
.eopt:hover{background:var(--vg)}
.eopt.active{background:rgba(139,92,246,0.18);color:var(--vl)}
.eopt img{width:15px;height:15px;border-radius:3px}
.elabel{font-size:10px;color:var(--muted);margin-left:auto;font-weight:300}

/* CONTENT */
#content{flex:1;position:relative;overflow:hidden;background:#0a0a12}
.pf{position:absolute;inset:0;border:none;display:none;width:100%;height:100%}
.pf.active{display:block}

/* NEW TAB PAGE */
#newtab{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#08080f;z-index:10;
}
#newtab.gone{display:none}

.nt-glow{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:600px;height:300px;
  background:radial-gradient(ellipse at 50% 0%,rgba(139,92,246,0.14) 0%,transparent 70%);
  pointer-events:none;
}

.nt-logo{
  font-size:48px;font-weight:300;letter-spacing:-1.5px;color:white;
  margin-bottom:28px;position:relative;
}
.nt-logo b{color:var(--v);font-weight:700}

.nt-sw{width:500px;max-width:90vw;position:relative;margin-bottom:36px}
.nt-si{
  width:100%;height:46px;background:rgba(255,255,255,0.03);
  border:1.5px solid var(--border);border-radius:23px;
  padding:0 50px 0 20px;color:white;font-family:'Inter',sans-serif;
  font-size:14px;outline:none;transition:border-color .2s,background .2s;
}
.nt-si:focus{border-color:var(--v);background:rgba(139,92,246,0.05)}
.nt-si::placeholder{color:rgba(255,255,255,0.18)}
.nt-go{
  position:absolute;right:7px;top:50%;transform:translateY(-50%);
  width:34px;height:34px;background:var(--v);border:none;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.nt-go:hover{background:var(--vd)}
.nt-go svg{width:15px;height:15px;fill:none;stroke:white;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

.nt-sc{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:560px}
.sc{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  cursor:pointer;transition:transform .2s;
}
.sc:hover{transform:translateY(-3px)}
.sc-i{
  width:50px;height:50px;background:rgba(255,255,255,0.03);border:1px solid var(--border2);
  border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;
  transition:border-color .2s,background .2s;
}
.sc:hover .sc-i{border-color:var(--v);background:var(--vg)}
.sc-l{font-size:10.5px;color:var(--muted);font-weight:400}

/* LOADING */
#load{
  position:absolute;inset:0;background:#08080f;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;
}
#load.show{display:flex}
#load img{width:200px;height:200px;object-fit:contain;border-radius:14px}
</style>
</head>
<body>
<div id="browser">

  <div id="tab-bar">
    <button id="newtab-btn" title="New tab">+</button>
  </div>

  <div id="toolbar">
    <button class="nb" id="bb" onclick="nav('back')" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nb" id="fb" onclick="nav('forward')" disabled>
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="nb" id="rb" onclick="nav('reload')">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>

    <div id="url-wrap">
      <span id="url-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input id="url-input" type="text" placeholder="Search or enter address" autocomplete="off" spellcheck="false">
    </div>

    <div id="engine-corner">
      <button id="engine-btn">
        <img id="eng-ico" src="https://www.google.com/favicon.ico" alt="">
      </button>
      <div id="engine-drop">
        <div class="eopt active" data-url="https://www.google.com/search?q=%s" data-ico="https://www.google.com/favicon.ico" onclick="setEng(this)">
          <img src="https://www.google.com/favicon.ico" alt="">Google<span class="elabel">g</span>
        </div>
        <div class="eopt" data-url="https://duckduckgo.com/?q=%s" data-ico="https://duckduckgo.com/favicon.ico" onclick="setEng(this)">
          <img src="https://duckduckgo.com/favicon.ico" alt="">DuckDuckGo<span class="elabel">ddg</span>
        </div>
        <div class="eopt" data-url="https://www.bing.com/search?q=%s" data-ico="https://www.bing.com/favicon.ico" onclick="setEng(this)">
          <img src="https://www.bing.com/favicon.ico" alt="">Bing<span class="elabel">b</span>
        </div>
        <div class="eopt" data-url="https://search.brave.com/search?q=%s" data-ico="https://brave.com/favicon.ico" onclick="setEng(this)">
          <img src="https://brave.com/favicon.ico" alt="">Brave<span class="elabel">br</span>
        </div>
        <div class="eopt" data-url="https://search.yahoo.com/search?p=%s" data-ico="https://www.yahoo.com/favicon.ico" onclick="setEng(this)">
          <img src="https://www.yahoo.com/favicon.ico" alt="">Yahoo<span class="elabel">y</span>
        </div>
      </div>
    </div>
  </div>

  <div id="content">
    <div id="newtab">
      <div class="nt-glow"></div>
      <div class="nt-logo">mob<b>web</b></div>
      <div class="nt-sw">
        <input class="nt-si" id="nt-si" type="text" placeholder="Search the web or enter a URL..." autocomplete="off" spellcheck="false">
        <button class="nt-go" onclick="doSearch()">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
      <div class="nt-sc">
        <div class="sc" onclick="go('https://youtube.com')"><div class="sc-i">▶</div><div class="sc-l">YouTube</div></div>
        <div class="sc" onclick="go('https://discord.com')"><div class="sc-i">💬</div><div class="sc-l">Discord</div></div>
        <div class="sc" onclick="go('https://reddit.com')"><div class="sc-i">🤖</div><div class="sc-l">Reddit</div></div>
        <div class="sc" onclick="go('https://spotify.com')"><div class="sc-i">🎵</div><div class="sc-l">Spotify</div></div>
        <div class="sc" onclick="go('https://twitch.tv')"><div class="sc-i">📺</div><div class="sc-l">Twitch</div></div>
        <div class="sc" onclick="go('https://chat.openai.com')"><div class="sc-i">🤖</div><div class="sc-l">ChatGPT</div></div>
        <div class="sc" onclick="go('https://github.com')"><div class="sc-i">⌨️</div><div class="sc-l">GitHub</div></div>
        <div class="sc" onclick="go('https://twitter.com')"><div class="sc-i">✖</div><div class="sc-l">X</div></div>
      </div>
    </div>

    <div id="load">
      <img src="https://c.tenor.com/PDVHdZ0XYJoAAAAd/tenor.gif" alt="loading">
    </div>
  </div>
</div>

<script>
let tabs=[],active=null,engUrl='https://www.google.com/search?q=%s',proxyReady=false,conn=null;

// proxy init
(async()=>{
  try{
    conn=new BareMux.BareMuxConnection("/baremux/worker.js");
    for(let i=3;i>0;i--){
      try{await conn.setTransport("/libcurl/index.mjs",[{websocket:"wss://wisp.rhw.one/"}]);break;}
      catch(e){if(i===1)throw e;await new Promise(r=>setTimeout(r,500));}
    }
    await navigator.serviceWorker.register("/uv/sw.js");
    proxyReady=true;
  }catch(e){console.error('proxy fail',e);}
})();

function resolveUrl(s){
  s=s.trim();if(!s)return null;
  try{return new URL(s).href;}catch(e){}
  try{const u=new URL('https://'+s);if(u.hostname.includes('.')&&!u.hostname.includes(' '))return u.href;}catch(e){}
  return engUrl.replace('%s',encodeURIComponent(s));
}

// engine
document.getElementById('engine-btn').addEventListener('click',e=>{
  e.stopPropagation();
  document.getElementById('engine-drop').classList.toggle('open');
});
document.addEventListener('click',()=>document.getElementById('engine-drop').classList.remove('open'));

function setEng(el){
  document.querySelectorAll('.eopt').forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
  engUrl=el.dataset.url;
  document.getElementById('eng-ico').src=el.dataset.ico;
  document.getElementById('engine-drop').classList.remove('open');
}

// tabs
function mkTab(url){
  const id='t'+Date.now();
  const t={id,url:null,title:'New Tab',frame:null,fav:null};
  tabs.push(t);active=id;
  renderTabs();
  if(url)loadUrl(url,id);
  else{showNT();setUrl('');}
  return id;
}

function killTab(id,e){
  if(e)e.stopPropagation();
  const i=tabs.findIndex(t=>t.id===id);
  const t=tabs[i];
  if(t&&t.frame)t.frame.remove();
  tabs.splice(i,1);
  if(!tabs.length){mkTab(null);}
  else{swTab(tabs[Math.min(i,tabs.length-1)].id);}
  renderTabs();
}

function swTab(id){
  active=id;
  const t=tabs.find(t=>t.id===id);
  if(!t)return;
  document.querySelectorAll('.pf').forEach(f=>f.classList.remove('active'));
  hideLoad();
  if(t.frame){
    document.getElementById('newtab').classList.add('gone');
    t.frame.classList.add('active');
    setUrl(t.url||'');
  }else{showNT();setUrl('');}
  renderTabs();updateNav();
}

function renderTabs(){
  const bar=document.getElementById('tab-bar');
  const btn=document.getElementById('newtab-btn');
  bar.querySelectorAll('.tab').forEach(el=>el.remove());
  tabs.forEach(t=>{
    const el=document.createElement('div');
    el.className='tab'+(t.id===active?' active':'');
    const fav=document.createElement('div');fav.className='tab-fav';
    if(t.fav){const img=document.createElement('img');img.src=t.fav;img.style.cssText='width:13px;height:13px;border-radius:2px';img.onerror=()=>{img.remove();fav.textContent='🌐'};fav.appendChild(img);}
    else{fav.textContent=t.frame?'🌐':'✦';fav.style.fontSize='11px';}
    const ti=document.createElement('div');ti.className='tab-title';ti.textContent=t.title;
    const x=document.createElement('div');x.className='tab-x';x.textContent='×';
    x.onclick=ev=>killTab(t.id,ev);
    el.appendChild(fav);el.appendChild(ti);el.appendChild(x);
    el.addEventListener('click',()=>swTab(t.id));
    bar.insertBefore(el,btn);
  });
}

// load
function loadUrl(raw,tabId){
  if(!raw)return;
  tabId=tabId||active;
  const t=tabs.find(t=>t.id===tabId);if(!t)return;
  const url=resolveUrl(raw);if(!url)return;
  showLoad();

  const go=()=>{
    let pu;
    try{pu=__uv$config.prefix+__uv$config.encodeUrl(url);}
    catch(e){hideLoad();return;}

    if(!t.frame){
      const f=document.createElement('iframe');
      f.className='pf';f.id='f_'+tabId;
      document.getElementById('content').appendChild(f);
      t.frame=f;
      f.addEventListener('load',()=>{hideLoad();updMeta(t);updateNav();});
    }
    document.getElementById('newtab').classList.add('gone');
    document.querySelectorAll('.pf').forEach(f=>f.classList.remove('active'));
    t.frame.src=pu;t.frame.classList.add('active');
    t.url=url;setUrl(url);renderTabs();
  };

  if(proxyReady)go();
  else{const p=setInterval(()=>{if(proxyReady){clearInterval(p);go();}},100);}
}

function updMeta(t){
  try{
    const d=t.frame.contentDocument;
    if(d){
      t.title=d.title||domain(t.url)||'Page';
      const fl=d.querySelector('link[rel*="icon"]');
      if(fl)t.fav=fl.href;
    }
  }catch(e){t.title=domain(t.url)||'Page';}
  renderTabs();
}

function domain(u){try{return new URL(u).hostname.replace('www.','');}catch(e){return u||'';}}
function setUrl(v){document.getElementById('url-input').value=v;}
function showNT(){document.getElementById('newtab').classList.remove('gone');document.querySelectorAll('.pf').forEach(f=>f.classList.remove('active'));}
function showLoad(){document.getElementById('load').classList.add('show');}
function hideLoad(){document.getElementById('load').classList.remove('show');}
function updateNav(){
  const t=tabs.find(t=>t.id===active);
  const b=document.getElementById('bb'),f=document.getElementById('fb');
  if(!t||!t.frame){b.disabled=true;f.disabled=true;return;}
  try{b.disabled=t.frame.contentWindow.history.length<=1;f.disabled=false;}
  catch(e){b.disabled=false;f.disabled=false;}
}

function nav(a){
  const t=tabs.find(t=>t.id===active);if(!t||!t.frame)return;
  if(a==='reload'){showLoad();t.frame.src=t.frame.src;return;}
  try{a==='back'?t.frame.contentWindow.history.back():t.frame.contentWindow.history.forward();}catch(e){}
  setTimeout(updateNav,100);
}

// url bar
document.getElementById('url-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const v=e.target.value.trim();if(v)loadUrl(v);}
});
document.getElementById('url-input').addEventListener('focus',function(){setTimeout(()=>this.select(),0);});

// new tab search
document.getElementById('nt-si').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
function doSearch(){const q=document.getElementById('nt-si').value.trim();if(q){loadUrl(q);document.getElementById('nt-si').value='';}}
function go(u){loadUrl(u);}

// new tab btn
document.getElementById('newtab-btn').addEventListener('click',()=>mkTab(null));

// panic
document.addEventListener('keydown',e=>{
  if(e.key==='`'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){
    window.location.href='https://classroom.google.com';
  }
});

// init
mkTab(null);
</script>
</body>
</html>
