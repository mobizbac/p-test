<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mobweb</title>
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/baremux/index.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #1a1a1a;
  color: #ccc;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* tab bar */
#tabs {
  display: flex;
  align-items: flex-end;
  background: #111;
  padding: 4px 4px 0 4px;
  gap: 2px;
  overflow-x: auto;
  overflow-y: hidden;
  min-height: 34px;
  flex-shrink: 0;
}
#tabs::-webkit-scrollbar { display: none; }

.tab {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 8px 5px 10px;
  background: #2a2a2a;
  border: 1px solid #333;
  border-bottom: none;
  border-radius: 4px 4px 0 0;
  cursor: pointer;
  font-size: 12px;
  color: #888;
  max-width: 180px;
  min-width: 70px;
  white-space: nowrap;
  overflow: hidden;
  flex-shrink: 0;
  user-select: none;
}
.tab.active {
  background: #1a1a1a;
  color: #ddd;
  border-color: #444;
}
.tab:hover:not(.active) { background: #333; color: #aaa; }

.tab-title { overflow: hidden; text-overflow: ellipsis; flex: 1; }

.tab-fav { width: 13px; height: 13px; flex-shrink: 0; font-size: 10px; display: flex; align-items: center; }
.tab-fav img { width: 13px; height: 13px; }

.close-tab {
  font-size: 14px;
  color: #555;
  line-height: 1;
  padding: 0 1px;
  flex-shrink: 0;
  opacity: 0;
}
.tab:hover .close-tab, .tab.active .close-tab { opacity: 1; }
.close-tab:hover { color: #ccc; }

#new-tab {
  padding: 4px 8px 4px;
  background: transparent;
  border: none;
  color: #555;
  font-size: 18px;
  cursor: pointer;
  align-self: flex-end;
  line-height: 1;
  border-radius: 4px 4px 0 0;
  margin-bottom: 0;
}
#new-tab:hover { color: #999; background: #2a2a2a; }

/* toolbar */
#toolbar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 8px;
  background: #222;
  border-bottom: 1px solid #333;
  flex-shrink: 0;
}

.navbtn {
  background: none;
  border: 1px solid #383838;
  color: #777;
  width: 28px;
  height: 28px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.navbtn:hover:not(:disabled) { background: #2e2e2e; color: #bbb; border-color: #555; }
.navbtn:disabled { opacity: 0.25; cursor: default; }
.navbtn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

#url-bar {
  flex: 1;
  position: relative;
}

#url-input {
  width: 100%;
  height: 28px;
  background: #111;
  border: 1px solid #3a3a3a;
  border-radius: 4px;
  padding: 0 10px;
  color: #ccc;
  font-size: 12.5px;
  font-family: inherit;
  outline: none;
}
#url-input:focus { border-color: #555; background: #0e0e0e; }
#url-input::placeholder { color: #444; }

/* engine picker */
#eng-wrap { position: relative; flex-shrink: 0; }
#eng-btn {
  width: 28px; height: 28px;
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 4px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#eng-btn:hover { background: #333; border-color: #555; }
#eng-btn img { width: 14px; height: 14px; border-radius: 2px; }

#eng-menu {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  background: #1e1e1e;
  border: 1px solid #3a3a3a;
  border-radius: 5px;
  padding: 4px;
  width: 160px;
  z-index: 9999;
}
#eng-menu.open { display: block; }

.eng-opt {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 12.5px;
  color: #ccc;
}
.eng-opt:hover { background: #2a2a2a; }
.eng-opt.active { background: #2a2a2a; color: #fff; }
.eng-opt img { width: 14px; height: 14px; border-radius: 2px; }
.eng-key { margin-left: auto; font-size: 10px; color: #555; font-family: monospace; }

/* content */
#content {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #111;
}

.frame {
  position: absolute;
  inset: 0;
  border: none;
  width: 100%;
  height: 100%;
  display: none;
}
.frame.active { display: block; }

/* new tab page */
#home {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #111;
  gap: 20px;
}
#home.hidden { display: none; }

#home h1 {
  font-size: 32px;
  font-weight: 300;
  color: #ddd;
  letter-spacing: -0.5px;
}
#home h1 b { font-weight: 700; color: #888; }

#home-search {
  display: flex;
  width: 440px;
  max-width: 90vw;
  gap: 0;
}
#home-input {
  flex: 1;
  height: 36px;
  background: #1a1a1a;
  border: 1px solid #3a3a3a;
  border-right: none;
  border-radius: 4px 0 0 4px;
  padding: 0 12px;
  color: #ccc;
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
#home-input:focus { border-color: #555; }
#home-input::placeholder { color: #444; }

#home-go {
  height: 36px;
  padding: 0 14px;
  background: #2d2d2d;
  border: 1px solid #3a3a3a;
  border-radius: 0 4px 4px 0;
  color: #aaa;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
#home-go:hover { background: #383838; color: #ddd; }

#shortcuts {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 500px;
  padding: 0 12px;
}

.shortcut {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  padding: 8px 10px;
  border-radius: 5px;
  transition: background 0.1s;
}
.shortcut:hover { background: #1e1e1e; }

.shortcut-icon {
  width: 36px;
  height: 36px;
  background: #1e1e1e;
  border: 1px solid #2e2e2e;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.shortcut-icon img { width: 20px; height: 20px; }
.shortcut-label { font-size: 11px; color: #666; }

/* loading */
#loading {
  position: absolute;
  inset: 0;
  background: #111;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 999;
}
#loading.show { display: flex; }
#loading p { font-size: 12px; color: #555; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.spinner {
  width: 24px;
  height: 24px;
  border: 2px solid #2a2a2a;
  border-top-color: #666;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="tabs">
  <button id="new-tab">+</button>
</div>

<div id="toolbar">
  <button class="navbtn" id="btn-back" onclick="nav('back')" disabled>
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="navbtn" id="btn-fwd" onclick="nav('fwd')" disabled>
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <button class="navbtn" id="btn-reload" onclick="nav('reload')">
    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
  </button>

  <div id="url-bar">
    <input id="url-input" type="text" placeholder="Search or type a URL" autocomplete="off" spellcheck="false">
  </div>

  <div id="eng-wrap">
    <button id="eng-btn">
      <img id="eng-icon" src="https://www.google.com/favicon.ico" alt="">
    </button>
    <div id="eng-menu">
      <div class="eng-opt active" data-url="https://www.google.com/search?q=%s" data-ico="https://www.google.com/favicon.ico" onclick="pickEngine(this)">
        <img src="https://www.google.com/favicon.ico">Google<span class="eng-key">g</span>
      </div>
      <div class="eng-opt" data-url="https://duckduckgo.com/?q=%s" data-ico="https://duckduckgo.com/favicon.ico" onclick="pickEngine(this)">
        <img src="https://duckduckgo.com/favicon.ico">DuckDuckGo<span class="eng-key">ddg</span>
      </div>
      <div class="eng-opt" data-url="https://www.bing.com/search?q=%s" data-ico="https://www.bing.com/favicon.ico" onclick="pickEngine(this)">
        <img src="https://www.bing.com/favicon.ico">Bing<span class="eng-key">b</span>
      </div>
      <div class="eng-opt" data-url="https://search.brave.com/search?q=%s" data-ico="https://brave.com/favicon.ico" onclick="pickEngine(this)">
        <img src="https://brave.com/favicon.ico">Brave<span class="eng-key">br</span>
      </div>
      <div class="eng-opt" data-url="https://search.yahoo.com/search?p=%s" data-ico="https://www.yahoo.com/favicon.ico" onclick="pickEngine(this)">
        <img src="https://www.yahoo.com/favicon.ico">Yahoo<span class="eng-key">y</span>
      </div>
    </div>
  </div>
</div>

<div id="content">
  <div id="home">
    <h1>mob<b>web</b></h1>
    <div id="home-search">
      <input id="home-input" type="text" placeholder="Search the web or enter URL..." autocomplete="off" spellcheck="false">
      <button id="home-go" onclick="doSearch()">Go</button>
    </div>
    <div id="shortcuts"></div>
  </div>
  <div id="loading">
    <div class="spinner"></div>
    <p id="load-url"></p>
  </div>
</div>

<script>
const SITES = [
  { label: 'YouTube',  url: 'https://youtube.com',        ico: 'https://www.youtube.com/favicon.ico' },
  { label: 'Discord',  url: 'https://discord.com',        ico: 'https://discord.com/assets/favicon.ico' },
  { label: 'Reddit',   url: 'https://reddit.com',         ico: 'https://www.reddit.com/favicon.ico' },
  { label: 'Spotify',  url: 'https://open.spotify.com',   ico: 'https://open.spotify.com/favicon.ico' },
  { label: 'Twitch',   url: 'https://twitch.tv',          ico: 'https://static.twitchsvc.net/favicon.ico' },
  { label: 'ChatGPT',  url: 'https://chat.openai.com',    ico: 'https://chat.openai.com/favicon.ico' },
  { label: 'GitHub',   url: 'https://github.com',         ico: 'https://github.com/favicon.ico' },
  { label: 'X',        url: 'https://twitter.com',        ico: 'https://abs.twimg.com/favicons/twitter.3.ico' },
];

const sc = document.getElementById('shortcuts');
SITES.forEach(s => {
  const el = document.createElement('div');
  el.className = 'shortcut';
  el.onclick = () => navigate(s.url);
  el.innerHTML = `<div class="shortcut-icon"><img src="${s.ico}" onerror="this.style.display='none'"></div><div class="shortcut-label">${s.label}</div>`;
  sc.appendChild(el);
});

let tabs = [], activeId = null;
let engUrl = 'https://www.google.com/search?q=%s';
let proxyReady = false;

(async () => {
  try {
    const conn = new BareMux.BareMuxConnection('/baremux/worker.js');
    for (let i = 3; i > 0; i--) {
      try { await conn.setTransport('/libcurl/index.mjs', [{ websocket: 'wss://wisp.rhw.one/' }]); break; }
      catch (e) { if (i === 1) throw e; await new Promise(r => setTimeout(r, 500)); }
    }
    await navigator.serviceWorker.register('/uv/sw.js');
    proxyReady = true;
  } catch (e) { console.warn('proxy failed', e); }
})();

function resolveUrl(s) {
  s = s.trim();
  if (!s) return null;
  try { return new URL(s).href; } catch (e) {}
  try { const u = new URL('https://' + s); if (u.hostname.includes('.') && !u.hostname.includes(' ')) return u.href; } catch (e) {}
  return engUrl.replace('%s', encodeURIComponent(s));
}

function newTab(url) {
  const id = 'tab_' + Date.now();
  tabs.push({ id, url: null, title: 'New Tab', frame: null, fav: null });
  activeId = id;
  renderTabs();
  if (url) navigate(url, id);
  else { showHome(); setUrlBar(''); }
}

function closeTab(id, e) {
  if (e) e.stopPropagation();
  const idx = tabs.findIndex(t => t.id === id);
  const t = tabs[idx];
  if (t && t.frame) t.frame.remove();
  tabs.splice(idx, 1);
  if (!tabs.length) { newTab(null); return; }
  switchTab(tabs[Math.min(idx, tabs.length - 1)].id);
}

function switchTab(id) {
  activeId = id;
  const t = tabs.find(t => t.id === id);
  if (!t) return;
  document.querySelectorAll('.frame').forEach(f => f.classList.remove('active'));
  hideLoading();
  if (t.frame) {
    document.getElementById('home').classList.add('hidden');
    t.frame.classList.add('active');
    setUrlBar(t.url || '');
  } else {
    showHome();
    setUrlBar('');
  }
  renderTabs();
  updateNavBtns();
}

function renderTabs() {
  const bar = document.getElementById('tabs');
  const addBtn = document.getElementById('new-tab');
  bar.querySelectorAll('.tab').forEach(el => el.remove());

  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.id === activeId ? ' active' : '');

    const fav = document.createElement('div');
    fav.className = 'tab-fav';
    if (t.fav) {
      const img = document.createElement('img');
      img.src = t.fav;
      img.onerror = () => { img.remove(); fav.textContent = '•'; };
      fav.appendChild(img);
    } else {
      fav.textContent = t.frame ? '•' : '○';
    }

    const title = document.createElement('span');
    title.className = 'tab-title';
    title.textContent = t.title;

    const x = document.createElement('span');
    x.className = 'close-tab';
    x.textContent = '×';
    x.onclick = ev => closeTab(t.id, ev);

    el.appendChild(fav);
    el.appendChild(title);
    el.appendChild(x);
    el.addEventListener('click', () => switchTab(t.id));
    bar.insertBefore(el, addBtn);
  });
}

function navigate(raw, tabId) {
  if (!raw) return;
  tabId = tabId || activeId;
  const t = tabs.find(t => t.id === tabId);
  if (!t) return;
  const url = resolveUrl(raw);
  if (!url) return;

  showLoading(url);

  const go = () => {
    let proxied;
    try { proxied = __uv$config.prefix + __uv$config.encodeUrl(url); }
    catch (e) { hideLoading(); return; }

    if (!t.frame) {
      const f = document.createElement('iframe');
      f.className = 'frame';
      document.getElementById('content').appendChild(f);
      t.frame = f;
      f.addEventListener('load', () => {
        hideLoading();
        try {
          const doc = f.contentDocument;
          if (doc) {
            t.title = doc.title || hostname(url) || 'Page';
            const link = doc.querySelector('link[rel*="icon"]');
            if (link) t.fav = link.href;
          }
        } catch (e) { t.title = hostname(url) || 'Page'; }
        renderTabs();
        updateNavBtns();
      });
    }

    document.getElementById('home').classList.add('hidden');
    document.querySelectorAll('.frame').forEach(f => f.classList.remove('active'));
    t.frame.src = proxied;
    t.frame.classList.add('active');
    t.url = url;
    setUrlBar(url);
    renderTabs();
  };

  if (proxyReady) go();
  else { const p = setInterval(() => { if (proxyReady) { clearInterval(p); go(); } }, 100); }
}

function nav(dir) {
  const t = tabs.find(t => t.id === activeId);
  if (!t || !t.frame) return;
  if (dir === 'reload') { showLoading(t.url); t.frame.src = t.frame.src; return; }
  try {
    if (dir === 'back') t.frame.contentWindow.history.back();
    else t.frame.contentWindow.history.forward();
  } catch (e) {}
  setTimeout(updateNavBtns, 120);
}

function updateNavBtns() {
  const t = tabs.find(t => t.id === activeId);
  const back = document.getElementById('btn-back');
  const fwd = document.getElementById('btn-fwd');
  if (!t || !t.frame) { back.disabled = fwd.disabled = true; return; }
  try { back.disabled = t.frame.contentWindow.history.length <= 1; fwd.disabled = false; }
  catch (e) { back.disabled = fwd.disabled = false; }
}

function showHome() {
  document.getElementById('home').classList.remove('hidden');
  document.querySelectorAll('.frame').forEach(f => f.classList.remove('active'));
}
function showLoading(url) {
  document.getElementById('loading').classList.add('show');
  document.getElementById('load-url').textContent = url || '';
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }
function setUrlBar(v) { document.getElementById('url-input').value = v; }
function hostname(u) { try { return new URL(u).hostname.replace('www.', ''); } catch (e) { return u || ''; } }

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { const v = e.target.value.trim(); if (v) navigate(v); }
});
document.getElementById('url-input').addEventListener('focus', function () {
  setTimeout(() => this.select(), 0);
});
document.getElementById('home-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function doSearch() {
  const q = document.getElementById('home-input').value.trim();
  if (q) { navigate(q); document.getElementById('home-input').value = ''; }
}

document.getElementById('eng-btn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('eng-menu').classList.toggle('open');
});
document.addEventListener('click', () => document.getElementById('eng-menu').classList.remove('open'));

function pickEngine(el) {
  document.querySelectorAll('.eng-opt').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  engUrl = el.dataset.url;
  document.getElementById('eng-icon').src = el.dataset.ico;
  document.getElementById('eng-menu').classList.remove('open');
}

document.getElementById('new-tab').addEventListener('click', () => newTab(null));

document.addEventListener('keydown', e => {
  if (e.key === '`' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    window.location.href = 'https://classroom.google.com';
  }
});

newTab(null);
</script>
</body>
</html>
